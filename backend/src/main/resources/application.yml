spring:
  application:
    name: mianshiba-ai-backend
  profiles:
    active: local
  ai:
    deepseek:
      api-key: ${AI_DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mianshiba}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/init.sql
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: PT24H
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  infrastructure:
    validate-on-startup: true
  file:
    provider: ${FILE_PROVIDER:local}
    upload-dir: ${FILE_UPLOAD_DIR:uploads}
    public-prefix: ${FILE_PUBLIC_PREFIX:/uploads}
    max-size: ${FILE_MAX_SIZE:2097152}
    aliyun:
      endpoint: ${ALIYUN_OSS_ENDPOINT:}
      bucket: ${ALIYUN_OSS_BUCKET:}
      access-key-id: ${ALIYUN_OSS_AK_ID:${ALIYUN_AK_ID:}}
      access-key-secret: ${ALIYUN_OSS_AK_SECRET:${ALIYUN_AK_SECRET:}}
      domain: ${ALIYUN_OSS_DOMAIN:}
  job-sourcing:
    provider: ${JOB_SOURCING_PROVIDER:local}
    target-count: ${JOB_SOURCING_TARGET_COUNT:20}
    max-pages-per-source: ${JOB_SOURCING_MAX_PAGES_PER_SOURCE:5}
    max-third-party-calls: ${JOB_SOURCING_MAX_THIRD_PARTY_CALLS:20}
    firecrawl-api-key: ${FIRECRAWL_API_KEY:}
    browser-profile-root: ${JOB_SOURCING_BROWSER_PROFILE_ROOT:browser-profiles}
    browser-headless: ${JOB_SOURCING_BROWSER_HEADLESS:false}
    browser-timeout-millis: ${JOB_SOURCING_BROWSER_TIMEOUT_MILLIS:30000}
  speech:
    provider: aliyun
    aliyun:
      access-key-id: ${ALIYUN_AK_ID:}
      access-key-secret: ${ALIYUN_AK_SECRET:}
      app-key: ${ALIYUN_NLS_APP_KEY:}
      region: ${ALIYUN_NLS_REGION:cn-shanghai}
