spring:
  application:
    name: mianshiba-ai-backend
  ai:
    deepseek:
      api-key: ${AI_DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: PT24H
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 5s

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  infrastructure:
    validate-on-startup: true
  speech:
    provider: aliyun
    aliyun:
      access-key-id: ${ALIYUN_AK_ID:}
      access-key-secret: ${ALIYUN_AK_SECRET:}
      app-key: ${ALIYUN_NLS_APP_KEY:}
      region: ${ALIYUN_NLS_REGION:cn-shanghai}
